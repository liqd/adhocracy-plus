{% load i18n %}

<span class="summary-feedback">
    <span class="summary-feedback__label">
        {% trans 'Was this summary helpful?' %}
    </span>
    <span class="summary-feedback__buttons">
        <button hx-post="{% url 'project-summary-feedback' organisation_slug=project.organisation.slug slug=project.slug %}"
                hx-vals='{"feedback": "positive", "summary_id": "{{ summary_id }}", "csrfmiddlewaretoken": "{{ csrf_token }}"}'
                hx-target="closest .summary-feedback"
                hx-swap="outerHTML"
                class="summary-feedback__btn{% if user_feedback == 'positive' %} summary-feedback__btn--active{% endif %}"
                type="button"
                aria-pressed="{% if user_feedback == 'positive' %}true{% else %}false{% endif %}"
                title="{% trans 'Yes, this summary was helpful' %}">
            <i class="fa-{% if user_feedback == 'positive' %}solid{% else %}regular{% endif %} fa-thumbs-up" aria-hidden="true"></i>
            <span class="visually-hidden">{% trans 'Yes' %}</span>
        </button>
        <button hx-post="{% url 'project-summary-feedback' organisation_slug=project.organisation.slug slug=project.slug %}"
                hx-vals='{"feedback": "negative", "summary_id": "{{ summary_id }}", "csrfmiddlewaretoken": "{{ csrf_token }}"}'
                hx-target="closest .summary-feedback"
                hx-swap="outerHTML"
                class="summary-feedback__btn{% if user_feedback == 'negative' %} summary-feedback__btn--active{% endif %}"
                type="button"
                aria-pressed="{% if user_feedback == 'negative' %}true{% else %}false{% endif %}"
                title="{% trans 'No, this summary was not helpful' %}">
            <i class="fa-{% if user_feedback == 'negative' %}solid{% else %}regular{% endif %} fa-thumbs-down" aria-hidden="true"></i>
            <span class="visually-hidden">{% trans 'No' %}</span>
        </button>
    </span>
</span>
