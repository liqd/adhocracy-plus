{% block module_description %}
    {% if module.phases.first.type != 'a4_candy_interactive_events:issue' %}
        <section class="project-detail__module-intro">
            <header>
                <h2 class="project-detail__title">{{ module.name }}</h2>
            </header>
            {% if module.description %}
            <p class="project-detail__description">{{ module.description }}</p>
            {% endif %}
        </section>
    {% endif %}
{% endblock module_description %}
